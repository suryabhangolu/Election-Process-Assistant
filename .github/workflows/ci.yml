name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run ESLint
      run: npx eslint "js/**/*.js" "tests/**/*.js"
      continue-on-error: true # Continuing on error in case eslint isn't fully configured yet

    - name: Run Jest tests
      run: npm run test:coverage
